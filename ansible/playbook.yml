
---
- name: Configure Web Server
  hosts: all
  become: yes

  vars:
    docker_image: "tawa123/infrastructure-platform"
    docker_tag: "latest"
    container_name: "infra-platform"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create webteam group
      group:
        name: webteam
        state: present

    - name: Create webadmin user
      user:
        name: webadmin
        groups: webteam
        append: yes
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Create developer user
      user:
        name: developer
        groups: webteam
        append: yes
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Create readonly user
      user:
        name: readonly
        shell: /bin/bash
        create_home: yes
        state: present

    - name: Create /var/www/html directory
      file:
        path: /var/www/html
        state: directory
        owner: webadmin
        group: webteam
        mode: '0755'

    - name: Deploy custom index.html
      copy:
        dest: /var/www/html/index.html
        owner: webadmin
        group: webteam
        mode: '0644'
        content: |
          <html>
          <head><title>DevOps Project</title></head>
          <body>
          <h1>Infrastructure Platform</h1>
          <p>Engineer: Bollah Mariame</p>
          <p>Date: {{ ansible_facts['date_time']['date'] }}</p>
          <p>Tools: Terraform, Ansible, Docker</p>
          </body>
          </html>

    - name: Create /opt/scripts directory
      file:
        path: /opt/scripts
        state: directory
        mode: '0755'

    - name: Deploy health check script
      copy:
        dest: /opt/scripts/health_check.sh
        mode: '0755'
        content: |
          #!/bin/bash
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S")
          LOG="/var/log/health_check.log"
          if curl -sf http://localhost > /dev/null; then
            echo "$TIMESTAMP OK - Nginx is up" >> $LOG
          else
            echo "$TIMESTAMP FAIL - Nginx is down" >> $LOG
          fi

    - name: Schedule health check every 5 minutes
      cron:
        name: "Health check"
        minute: "*/5"
        job: "/opt/scripts/health_check.sh"

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'

    - name: Restart SSH service
      service:
        name: ssh
        state: restarted

    - name: Install Docker dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker
      apt:
        name: docker-ce
        state: present
        update_cache: yes

    - name: Install Docker Python SDK
      pip:
        name: docker
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull Docker image
      docker_image:
        name: "{{ docker_image }}:{{ docker_tag }}"
        source: pull

    - name: Stop old container if running
      docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes

    - name: Run Flask container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}:{{ docker_tag }}"
        state: started
        ports:
          - "5000:5000"
        restart_policy: always

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/infra-platform
        content: |
          server {
              listen 80;

              location / {
                  proxy_pass http://localhost:5000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/infra-platform
        dest: /etc/nginx/sites-enabled/infra-platform
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded

    - name: Verify app is responding
      uri:
        url: http://localhost
        status_code: 200

    - name: Create monitor log directory
      file:
        path: /var/log/monitor
        state: directory
        mode: '0755'

    - name: Create monitor reports directory
      file:
        path: /var/log/monitor/reports
        state: directory
        mode: '0755'

    - name: Deploy health monitor script
      copy:
        dest: /opt/scripts/health_monitor.sh
        mode: '0755'
        content: |
          #!/bin/bash
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S")
          LOG="/var/log/monitor/health.log"
          STATUS="OK"

          if ! systemctl is-active --quiet nginx; then
              STATUS="CRITICAL"
              echo "$TIMESTAMP - CRITICAL - Nginx is NOT running" >> $LOG
          fi

          if ! docker ps | grep -q infra-platform; then
              STATUS="CRITICAL"
              echo "$TIMESTAMP - CRITICAL - Flask container is NOT running" >> $LOG
          fi

          if ! curl -sf http://localhost/health > /dev/null; then
              STATUS="CRITICAL"
              echo "$TIMESTAMP - CRITICAL - App is NOT responding" >> $LOG
          fi

          if [ "$STATUS" = "OK" ]; then
              echo "$TIMESTAMP - OK - all systems up" >> $LOG
          fi

    - name: Deploy alert checker script
      copy:
        dest: /opt/scripts/alert_checker.sh
        mode: '0755'
        content: |
          #!/bin/bash
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S")
          HEALTH_LOG="/var/log/monitor/health.log"
          ALERT_LOG="/var/log/monitor/alerts.log"

          mkdir -p /var/log/monitor

          RECENT_LOGS=$(awk -v date="$(date --date='10 minutes ago' '+%Y-%m-%d %H:%M:%S')" '$0 >= date' $HEALTH_LOG)
          CRITICAL_COUNT=$(echo "$RECENT_LOGS" | grep -c "CRITICAL")

          if [ "$CRITICAL_COUNT" -gt 3 ]; then
              echo "$TIMESTAMP - ALERT - $CRITICAL_COUNT critical events in last 10 minutes" >> $ALERT_LOG
          fi

    - name: Deploy daily report script
      copy:
        dest: /opt/scripts/daily_report.sh
        mode: '0755'
        content: |
          #!/bin/bash
          DATE=$(date "+%Y-%m-%d")
          TIMESTAMP=$(date "+%Y-%m-%d %H:%M:%S")
          LOG="/var/log/monitor/health.log"
          REPORT_DIR="/var/log/monitor/reports"
          REPORT_FILE="$REPORT_DIR/$DATE-report.txt"

          mkdir -p "$REPORT_DIR"

          TODAY_LOGS=$(grep "$DATE" "$LOG")
          OK_COUNT=$(echo "$TODAY_LOGS" | grep -c "OK")
          CRITICAL_COUNT=$(echo "$TODAY_LOGS" | grep -c "CRITICAL")
          TOTAL=$((OK_COUNT + CRITICAL_COUNT))

          if [ "$TOTAL" -eq 0 ]; then
              UPTIME=0
          else
              UPTIME=$(echo "scale=2; ($OK_COUNT / $TOTAL) * 100" | bc)
          fi

          {
          echo "=================================="
          echo "Daily System Report - $DATE"
          echo "Generated: $TIMESTAMP"
          echo "=================================="
          echo "OK entries:       $OK_COUNT"
          echo "CRITICAL entries: $CRITICAL_COUNT"
          echo "Total checks:     $TOTAL"
          echo "Uptime:           $UPTIME%"
          echo "=================================="
          } > "$REPORT_FILE"

          echo "$TIMESTAMP - Daily report generated: $REPORT_FILE" >> "$LOG"

    - name: Schedule health monitor every minute
      cron:
        name: "health monitor"
        minute: "*"
        job: "/opt/scripts/health_monitor.sh"

    - name: Schedule alert checker every 5 minutes
      cron:
        name: "alert checker"
        minute: "*/5"
        job: "/opt/scripts/alert_checker.sh"

    - name: Schedule daily report at midnight
      cron:
        name: "daily report"
        minute: "0"
        hour: "0"
        job: "/opt/scripts/daily_report.sh"

    - name: Run health monitor once to verify
      command: /opt/scripts/health_monitor.sh

    - name: Check health log
      command: cat /var/log/monitor/health.log
      register: health_log_output

    - name: Show health log
      debug:
        msg: "{{ health_log_output.stdout_lines }}"
